# Per-robot connector deployment.
# Each robot runs in its own container.

x-connector: &defaults
  build:
    context: ../
    dockerfile: docker/Dockerfile
  env_file:
    - ../config/.env
  environment:
    - CONFIG_FILE=/config/fleet.yaml
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
  volumes:
    - ../config/my_fleet.yaml:/config/fleet.yaml:ro
  network_mode: host
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: "5"

services:
  mir200-1:
    <<: *defaults
    container_name: mir_connector_mir200-1
    environment:
      - ROBOT_ID=mir200-1
      - CONFIG_FILE=/config/fleet.yaml

  mir500-1:
    <<: *defaults
    container_name: mir_connector_mir500-1
    environment:
      - ROBOT_ID=mir500-1
      - CONFIG_FILE=/config/fleet.yaml
