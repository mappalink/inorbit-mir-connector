services:
  mir200-1-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mir_connector_mir200-1-dev
    env_file: .env
    environment:
      - ROBOT_ID=mir200-1-dev
      - CONFIG_FILE=/config/fleet.yaml
      - LOG_LEVEL=DEBUG
    volumes:
      - ./config/my_fleet.yaml:/config/fleet.yaml:ro
    network_mode: host
    restart: "no"
