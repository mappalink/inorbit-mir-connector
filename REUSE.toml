version = 1
SPDX-PackageName = "mir-connector"
SPDX-PackageSupplier = "https://github.com/mappalink/mir-connector"

# Configuration files that don't require copyright/license headers in the file itself
# These are annotated here with MIT (same as the rest of the project)
[[annotations]]
path = "uv.lock"
SPDX-FileCopyrightText = "N/A"
SPDX-License-Identifier = "MIT"
SPDX-FileComment = "uv.lock file"

[[annotations]]
path = ".python-version"
SPDX-FileCopyrightText = "N/A"
SPDX-License-Identifier = "MIT"
SPDX-FileComment = "Python version file"

[[annotations]]
path = ".gitattributes"
SPDX-FileCopyrightText = "N/A"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "config/example.env"
SPDX-FileCopyrightText = "2026 Mappalink"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "config/fleet.example.yaml"
SPDX-FileCopyrightText = "2026 Mappalink"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "docker-compose.yaml"
SPDX-FileCopyrightText = "2026 Mappalink"
SPDX-License-Identifier = "MIT"
